$kind: http-request
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
body:
  type: json
  content: |-
    {
        "username": "admin",
        "password": "123456"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if(jsonData.token) { pm.environment.set("token", jsonData.token); }
    language: text/javascript
order: 1000
